<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Zentinel | Nuevo Producto')}"></head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar('Nuevo Producto', 'Registro en catálogo')}"></div>

        <div class="content-wrapper">
            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" class="premium-form">
                <div class="form-grid">
                    <div class="form-card">
                        <h3>Datos Básicos</h3>
                        <div class="input-group">
                            <label>SKU (Código único)</label>
                            <input type="text" th:field="*{sku}" required placeholder="Ej. PROD-001" th:readonly="${edicion == true}" th:style="${edicion == true ? 'opacity:0.6; cursor:not-allowed;' : ''}">
                        </div>
                        <div class="input-group">
                            <label>Nombre del Producto</label>
                            <input type="text" th:field="*{nombre}" required placeholder="Ej. Martillo de bola">
                        </div>
                        <div class="input-group">
                            <label>Categoría</label>
                            <select th:field="*{tipoProducto}" required>
                                <option value="">Seleccione...</option>
                                <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-card">
                        <h3>Precios y Medida</h3>
                        <div class="input-group">
                            <label>Unidad de Medida</label>
                            <input type="text" th:field="*{unidadMedida}" required placeholder="Ej. PZA, KG, M">
                        </div>
                        <div class="input-group">
                            <label>Precio Unitario</label>
                            <input type="number" th:field="*{precioUnitario}" step="0.01" required>
                        </div>
                        <div class="input-group" style="flex-direction: row; align-items: center; gap: 0.8rem; padding-top: 0.5rem;">
                            <input type="checkbox" th:field="*{aceptaDecimales}" style="width: 20px; height: 20px; cursor: pointer;">
                            <label style="margin-bottom: 0;">¿Acepta Cantidades Decimales?</label>
                        </div>
                    </div>

                    <div class="form-card full-width" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <h3 style="grid-column: 1 / -1;">Alertas de Stock</h3>
                        <div class="input-group">
                            <label>Stock Mínimo (Alerta Crítica)</label>
                            <input type="number" th:field="*{minimoStock}" placeholder="Ej. 5">
                        </div>
                        <div class="input-group">
                            <label>Stock Máximo (Alerta Exceso)</label>
                            <input type="number" th:field="*{maximoStock}" placeholder="Ej. 100">
                        </div>
                    </div>
                </div>

                <div class="form-card full-width">
                    <h3>Descripción</h3>
                    <textarea th:field="*{descripcion}" rows="3" cols="10"
                        placeholder="Escriba aquí el motivo detallado de la salida (este campo es amplio para su comodidad)..."
                        style="width: 100%; box-sizing: border-box; resize: vertical; min-height: 120px; font-size: 1.1rem; padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.4); color: white;"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Producto</button>
                    <a th:href="@{/productos}" class="btn-ghost">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
