<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <div th:fragment="sidebar" class="sidebar" style="height: auto; min-height: 100vh;">
        <div class="logo">Zentinel</div>
        <a href="/" th:classappend="${currentUri == '/' ? 'active' : ''}" class="nav-item">Dashboard</a>

        <!-- PANEL GLOBAL (Solo Super Admin) -->
        <th:block sec:authorize="hasRole('SUPER_ADMIN')">
            <div
                style="padding: 1rem 1.5rem 0.5rem; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">
                Zentinel Master</div>
            <a href="/zentinel-master/empresas"
                th:classappend="${#strings.startsWith(currentUri, '/zentinel-master') ? 'active' : ''}"
                class="nav-item">Gestionar Empresas</a>
        </th:block>

        <div
            style="padding: 1rem 1.5rem 0.5rem; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">
            Operaciones</div>
        <!-- Productos, Entradas, Salidas: Visibles para ADMIN_EMPRESA, AUDITOR, OPERATIVO -->
        <a href="/productos" th:classappend="${#strings.startsWith(currentUri, '/productos') ? 'active' : ''}"
            class="nav-item">Productos</a>
        <a href="/entradas" th:classappend="${#strings.startsWith(currentUri, '/entradas') ? 'active' : ''}"
            class="nav-item">Entradas</a>
        <a href="/salidas" th:classappend="${#strings.startsWith(currentUri, '/salidas') ? 'active' : ''}"
            class="nav-item">Salidas</a>

        <!-- Proveedores, Clientes, Estadísticas: Visibles para ADMIN_EMPRESA, AUDITOR -->
        <th:block sec:authorize="hasAnyRole('ADMIN_EMPRESA', 'AUDITOR')">
            <div style="padding: 1rem 1.5rem 0.5rem; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">
                Reportes y Catálogos</div>
            <a href="/proveedores" th:classappend="${#strings.startsWith(currentUri, '/proveedores') ? 'active' : ''}"
                class="nav-item">Proveedores</a>
            <a href="/clientes" th:classappend="${#strings.startsWith(currentUri, '/clientes') ? 'active' : ''}"
                class="nav-item">Clientes</a>
            <a href="/estadisticas" th:classappend="${#strings.startsWith(currentUri, '/estadisticas') ? 'active' : ''}"
                class="nav-item">Estadísticas</a>
        </th:block>


        <!-- ADMINISTRACIÓN DE EMPRESA (Solo Admin de Empresa) -->
        <th:block sec:authorize="hasRole('ADMIN_EMPRESA')">
            <div
                style="padding: 1rem 1.5rem 0.5rem; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">
                Administración</div>
            <a href="/usuarios" th:classappend="${#strings.startsWith(currentUri, '/usuarios') ? 'active' : ''}"
                class="nav-item">Usuarios</a>
            <a href="/almacenes" th:classappend="${#strings.startsWith(currentUri, '/almacenes') ? 'active' : ''}"
                class="nav-item">Gestionar Almacenes</a>
            
            <div style="margin-left: 1rem; margin-top: 0.5rem; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 0.5rem;">
                <div th:each="alm : ${listaAlmacenesSidebar}" 
                     style="display: flex; justify-content: space-between; align-items: center; padding: 0.3rem 0.5rem; border-radius: 4px; font-size: 0.9rem; color: #a0aec0;">
                    <span th:text="${alm.nombre}">Nombre Almacén</span>
                    <a th:href="@{'/almacenes/editar/' + ${alm.id}}" 
                       style="color: var(--primary); font-size: 0.75rem; text-decoration: none; opacity: 0.7;"
                       onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.7">Editar</a>
                </div>
            </div>

            <a href="/categorias" th:classappend="${#strings.startsWith(currentUri, '/categorias') ? 'active' : ''}"
                class="nav-item">Categorías</a>
            <a href="/configuracion"
                th:classappend="${#strings.startsWith(currentUri, '/configuracion') ? 'active' : ''}"
                class="nav-item">Configuración</a>
        </th:block>
    </div>
</body>

</html>
