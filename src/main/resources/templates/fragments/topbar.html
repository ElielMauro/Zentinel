<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<body>
    <div th:fragment="topbar(title, description)" class="header">
        <!-- Bloque de Mensajes / Alertas Globales -->
        <div th:if="${mensaje != null}" style="padding: 1rem; background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: #10B981; border-radius: 12px; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; width: 100%;">
            <span>✅</span> <span th:text="${mensaje}"></span>
        </div>
        <div th:if="${error != null}" style="padding: 1rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #EF4444; border-radius: 12px; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; width: 100%;">
            <span>⚠️</span> <span th:text="${error}"></span>
        </div>
        <div>
            <h1 th:text="${title}">Título</h1>
            <p th:if="${description}" th:text="${description}" style="color: var(--text-muted); margin-top: 5px;"></p>
        </div>
        <div class="user-info" style="display: flex; align-items: center; gap: 1.5rem;">
            <!-- Indicador de Almacén Activo -->
            <div th:if="${activeAlmacen}"
                style="display: flex; align-items: center; gap: 0.5rem; background: rgba(79, 70, 229, 0.1); padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid rgba(79, 70, 229, 0.2);">
                <span style="font-size: 1.2rem;">🏢</span>
                <div style="line-height: 1.2;">
                    <div
                        style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">
                        Almacén Activo</div>
                    <div style="font-size: 0.9rem; font-weight: 600; color: var(--primary);"
                        th:text="${activeAlmacen.nombre}">Almacén Central</div>
                </div>
                <a th:href="@{/almacen-selector}"
                    style="text-decoration: none; font-size: 0.8rem; margin-left: 0.5rem; opacity: 0.7;"
                    title="Cambiar Almacén">🔄</a>
            </div>

            <!-- Indicador de Empresa para Super Admin -->
            <div th:if="${session.currentEmpresa}" 
                 style="display: flex; align-items: center; gap: 0.5rem; background: rgba(16, 185, 129, 0.1); padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid rgba(16, 185, 129, 0.2);">
                 <span style="font-size: 1.1rem;">🏢</span>
                 <div style="line-height: 1.2;">
                    <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">Empresa Gestionando</div>
                    <div style="font-size: 0.9rem; font-weight: 600; color: #10B981;" th:text="${session.currentEmpresa.nombre}">Nombre Empresa</div>
                 </div>
                 <a th:href="@{/zentinel-master/empresas/salir}" 
                    style="text-decoration: none; font-size: 0.8rem; margin-left: 0.5rem; color: #EF4444; font-weight: bold;" 
                    title="Quitar filtro de empresa">✖</a>
            </div>

            <span style="color: var(--text-muted)">Hola, <span sec:authentication="name"
                    style="color: white; font-weight: 600;">Usuario</span></span>
            
            <!-- Botón perfil/clave -->
            <button type="button" class="btn" style="background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 0.4rem 0.8rem; border-radius: 8px;" onclick="document.getElementById('modalMiPassword').style.display='flex'">🔑</button>

            <form th:action="@{/logout}" method="post" style="margin: 0;">
                <button type="submit" class="btn btn-danger" style="cursor: pointer; padding: 0.4rem 1rem;">Cerrar
                    Sesión</button>
            </form>
        </div>

        <!-- Modal Mi Contraseña -->
        <div id="modalMiPassword" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); align-items:center; justify-content:center; z-index:50;">
            <div class="modal-content" style="background:var(--surface); padding:2rem; border-radius:16px; width:400px; border:1px solid rgba(255,255,255,0.1);">
                <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                    <h3 style="margin:0;">Cambiar Mi Contraseña</h3>
                    <button onclick="document.getElementById('modalMiPassword').style.display='none'" style="background:none; border:none; color:white; cursor:pointer;">&times;</button>
                </div>
                <form th:action="@{/usuarios/mi-password}" method="post">
                    <div class="input-group">
                        <label>Ingresa tu nueva contraseña</label>
                        <input type="password" name="nuevaPassword" required minlength="4" style="width:100%; padding:0.75rem; border-radius:8px; background:rgba(15,23,42,0.6); border:1px solid rgba(255,255,255,0.1); color:white; box-sizing:border-box;">
                    </div>
                    <div style="text-align: right; margin-top: 1.5rem;">
                        <button type="submit" class="btn-primary">Actualizar Contraseña</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
