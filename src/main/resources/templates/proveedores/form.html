<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Zentinel | Nuevo Proveedor')}"></head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar('Nuevo Proveedor', 'Alta de socio comercial')}"></div>

        <div class="content-wrapper">
            <form th:action="@{/proveedores/guardar}" th:object="${proveedor}" method="post" class="premium-form">
                <div class="form-grid">
                    <div class="form-card">
                        <h3>Identificación</h3>
                        <div class="input-group">
                            <label>Nombre Corto / Comercial</label>
                            <input type="text" th:field="*{nombreCorto}" required>
                        </div>
                        <div class="input-group">
                            <label>Razón Social / Nombre Completo</label>
                            <input type="text" th:field="*{nombreCompleto}" required>
                        </div>
                        <div class="input-group">
                            <label>RFC</label>
                            <input type="text" th:field="*{rfc}" maxlength="13">
                        </div>
                    </div>

                    <div class="form-card">
                        <h3>Contacto</h3>
                        <div class="input-group">
                            <label>Persona de Contacto</label>
                            <input type="text" th:field="*{contacto}">
                        </div>
                        <div class="input-group">
                            <label>Teléfono</label>
                            <input type="text" th:field="*{telefono}">
                        </div>
                        <div class="input-group">
                            <label>Correo Electrónico</label>
                            <input type="email" th:field="*{correo}">
                        </div>
                    </div>
                </div>

                <div class="form-card full-width">
                    <label>Dirección</label>
                    <input type="text" th:field="*{direccion}" placeholder="Calle, Número, Col., C.P.">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Proveedor</button>
                    <a th:href="@{/proveedores}" class="btn-ghost">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
