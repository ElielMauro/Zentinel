<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Zentinel | Nuevo Cliente')}"></head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar('Nuevo Cliente', 'Alta de cliente en cartera')}"></div>

        <div class="content-wrapper">
            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post" class="premium-form">
                <div class="form-grid">
                    <div class="form-card">
                        <h3>Identificación</h3>
                        <div class="input-group">
                            <label>Código Interno</label>
                            <input type="text" th:field="*{codigo}" required placeholder="Ej. CLI-001">
                        </div>
                        <div class="input-group">
                            <label>Nombre / Razón Social</label>
                            <input type="text" th:field="*{nombre}" required>
                        </div>
                        <div class="input-group">
                            <label>RFC</label>
                            <input type="text" th:field="*{rfc}" maxlength="13">
                        </div>
                    </div>

                    <div class="form-card">
                        <h3>Clasificación y Contacto</h3>
                        <div class="input-group">
                            <label>Tipo de Cliente</label>
                            <select name="tipoCliente.id" id="tipoCliente" required>
                                <option value="">Seleccione...</option>
                                <option th:each="t : ${tiposCliente}" th:value="${t.id}" th:text="${t.nombre}" th:selected="${cliente.tipoCliente != null and cliente.tipoCliente.id == t.id}"></option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Teléfono</label>
                            <input type="text" th:field="*{telefono}">
                        </div>
                        <div class="input-group">
                            <label>Correo Electrónico</label>
                            <input type="email" th:field="*{correo}">
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Guardar Cliente</button>
                    <a th:href="@{/clientes}" class="btn-ghost">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
