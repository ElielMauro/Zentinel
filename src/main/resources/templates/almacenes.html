<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Zentinel | Almacenes')}"></head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar('Gestión de Almacenes', 'Configuración de sedes y bodegas')}">
        </div>

        <!-- Alertas de éxito/error -->
        <div th:if="${mensaje}" style="margin-bottom: 1.5rem; padding: 1rem; border-radius: 12px; background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success); display: flex; align-items: center; gap: 0.8rem;">
            <span>✅</span>
            <span th:text="${mensaje}"></span>
        </div>
        <div th:if="${error}" style="margin-bottom: 1.5rem; padding: 1rem; border-radius: 12px; background: var(--danger-bg); border: 1px solid var(--danger-border); color: #F87171; display: flex; align-items: center; gap: 0.8rem;">
            <span>❌</span>
            <span th:text="${error}"></span>
        </div>

        <div style="margin-bottom: 2rem; display: flex; justify-content: flex-end;">
            <a th:href="@{/almacenes/nuevo}" class="btn-add">+ Nuevo Almacén</a>
        </div>

        <div class="form-card full-width">
            <h3>Lista de Almacenes</h3>
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Ubicación</th>
                        <th>Empresa</th>
                        <th>Estado</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${listaAlmacenes}">
                        <td th:text="${a.id}"></td>
                        <td th:text="${a.nombre}"></td>
                        <td th:text="${a.ubicacion}"></td>
                        <td th:text="${a.empresa != null ? a.empresa.nombre : 'N/A'}"></td>
                        <td>
                            <span th:class="${'badge ' + (a.activo ? 'badge-success' : 'badge-danger')}"
                                th:text="${a.activo ? 'Activo' : 'Inactivo'}"></span>
                        </td>
                        <td style="text-align: center;">
                            <div style="display: flex; justify-content: center; gap: 0.5rem;">
                                <a th:href="@{/almacenes/editar/{id}(id=${a.id})}" class="btn-ghost" title="Editar" style="font-size: 1.1rem; color: var(--text-muted);">✏️</a>
                                <a th:href="@{/almacenes/eliminar/{id}(id=${a.id})}" 
                                   class="btn-ghost" 
                                   title="Eliminar" 
                                   style="font-size: 1.1rem; color: #F87171;"
                                   onclick="return confirm('¿Estás seguro de que deseas eliminar este almacén? Esta acción no se puede deshacer.')">🗑️</a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
