<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: head('Zentinel | Usuarios')}"></th:block>
    <style>
        .table-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-active {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid var(--success-border);
        }

        .status-inactive {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid var(--danger-border);
        }

        /* Form Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal-content {
            background: var(--surface);
            padding: 2rem;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            margin: 0;
            font-size: 1.5rem;
        }

        .close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
    </style>
</head>

<body>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div
            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; gap: 2rem;">
            <div th:replace="~{fragments/topbar :: topbar('Gestión de Usuarios', null)}"
                style="margin-bottom: 0; flex:1;"></div>

            <button class="btn-primary" onclick="document.getElementById('userModal').style.display='flex'"
                style="padding: 0.8rem 1.5rem; border-radius: 12px;">+ Nuevo
                Usuario</button>
        </div>

        <div class="table-container">
            <div class="search-box" style="flex: 1; max-width: 400px; position: relative;">
                <input type="text" id="userSearch" placeholder="Buscar por nombre, usuario o correo..."
                    onkeyup="filterUsers()"
                    style="width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white;">
                <span
                    style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); opacity: 0.5;">🔍</span>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Nombre Completo</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${usuarios}">
                        <td th:text="${user.usuario}">admin</td>
                        <td th:text="${user.nombre + ' ' + user.apellidoPaterno}">Juan Pérez</td>
                        <td th:text="${user.correo}">juan@example.com</td>
                        <td th:text="${user.rol}">ADMIN</td>
                        <td>
                            <span
                                th:class="${user.activo} ? 'status-badge status-active' : 'status-badge status-inactive'"
                                th:text="${user.activo} ? 'Activo' : 'Inactivo'">Activo</span>
                        </td>
                        <td>
                            <form th:if="${user.activo}" th:action="@{/usuarios/eliminar}" method="post"
                                style="display:inline;">
                                <input type="hidden" name="id" th:value="${user.usuario}">
                                <button type="submit" class="btn btn-danger"
                                    style="padding: 0.4rem 0.8rem; font-size: 0.85rem;"
                                    onclick="return confirm('¿Desactivar este usuario?')">Desactivar</button>
                            </form>
                            <form th:unless="${user.activo}" th:action="@{/usuarios/activar}" method="post"
                                style="display:inline;">
                                <input type="hidden" name="id" th:value="${user.usuario}">
                                <button type="submit" class="btn"
                                    style="padding: 0.4rem 0.8rem; font-size: 0.85rem; background-color: var(--success); color: white; border: none; border-radius: 8px;"
                                    onclick="return confirm('¿Volver a activar este usuario?')">Activar</button>
                            </form>
                            <button type="button" class="btn" th:onclick="'abrirModalPassword(\'' + ${user.usuario} + '\')'"
                                style="padding: 0.4rem 0.8rem; font-size: 0.85rem; background-color: var(--primary); color: white; border: none; border-radius: 8px; margin-left: 0.5rem;"
                                title="Cambiar Contraseña">🔒 Clave</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Nuevo Usuario</h2>
                <button class="close"
                    onclick="document.getElementById('userModal').style.display='none'">&times;</button>
            </div>
            <form th:action="@{/usuarios/guardar}" method="post" th:object="${nuevoUsuario}">
                <div class="form-group">
                    <label>Usuario (ID)</label>
                    <input type="text" th:field="*{usuario}" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" th:field="*{password}" required>
                </div>
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Apellido Paterno</label>
                        <input type="text" th:field="*{apellidoPaterno}" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Apellido Materno</label>
                        <input type="text" th:field="*{apellidoMaterno}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" th:field="*{correo}" required>
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select th:field="*{rol}" id="rolSelect" onchange="toggleAlmacenSelector()">
                        <option value="ADMIN_EMPRESA">Administrador Principal</option>
                        <option value="ADMIN">Administrador Secundario</option>
                        <option value="USER">Usuario (Almacenista)</option>
                        <option value="MOSTRADOR">Mostrador / Ventas</option>
                        <option value="AUDITOR">Auditoría</option>
                    </select>
                </div>
                <div class="form-group" id="almacenSelectorGroup">
                    <label>Almacenes asignados</label>
                    <div
                        style="max-height: 150px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 0.5rem;">
                        <div th:each="alm : ${almacenesDisponibles}"
                            style="padding: 0.4rem 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                            <input type="checkbox" name="almacenIds" th:value="${alm.id}" th:id="'alm_' + ${alm.id}"
                                style="accent-color: var(--primary); width: 16px; height: 16px;" checked="checked">
                            <label th:for="'alm_' + ${alm.id}" th:text="${alm.nombre}"
                                style="color: var(--text); margin: 0; cursor: pointer;">Almacén</label>
                        </div>
                        <p th:if="${#lists.isEmpty(almacenesDisponibles)}"
                            style="color: var(--text-muted); margin: 0.5rem; font-size: 0.85rem;">No hay almacenes
                            registrados en esta empresa.</p>
                    </div>
                    <small style="color: var(--text-muted);">Selecciona los almacenes a los que tendrá acceso. Si no
                        seleccionas ninguno, se asignarán todos.</small>
                </div>
                <div style="text-align: right; margin-top: 1.5rem;">
                    <button type="button" class="btn"
                        onclick="document.getElementById('userModal').style.display='none'"
                        style="background: transparent; color: var(--text-muted); margin-right: 1rem;">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Usuario</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modificar Contraseña Modal -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Cambiar Contraseña</h2>
                <button class="close" onclick="document.getElementById('changePasswordModal').style.display='none'">&times;</button>
            </div>
            <form th:action="@{/usuarios/cambiar-password}" method="post">
                <input type="hidden" name="usuarioId" id="pwdUsuarioId">
                <div class="form-group">
                    <label>Nueva Contraseña</label>
                    <input type="password" name="nuevaPassword" required minlength="4">
                </div>
                <div style="text-align: right; margin-top: 1.5rem;">
                    <button type="button" class="btn" onclick="document.getElementById('changePasswordModal').style.display='none'" style="background: transparent; color: var(--text-muted); margin-right: 1rem;">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Nueva Clave</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function filterUsers() {
            const input = document.getElementById("userSearch");
            const filter = input.value.toLowerCase();
            const table = document.querySelector("table");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const tdUsuario = tr[i].getElementsByTagName("td")[0];
                const tdNombre = tr[i].getElementsByTagName("td")[1];
                const tdCorreo = tr[i].getElementsByTagName("td")[2];
                if (tdUsuario || tdNombre || tdCorreo) {
                    const txtUsuario = tdUsuario.textContent || tdUsuario.innerText;
                    const txtNombre = tdNombre.textContent || tdNombre.innerText;
                    const txtCorreo = tdCorreo.textContent || tdCorreo.innerText;
                    if (txtUsuario.toLowerCase().indexOf(filter) > -1 ||
                        txtNombre.toLowerCase().indexOf(filter) > -1 ||
                        txtCorreo.toLowerCase().indexOf(filter) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }

        window.onclick = function (event) {
            var modal = document.getElementById('userModal');
            var pwdModal = document.getElementById('changePasswordModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
            if (event.target == pwdModal) {
                pwdModal.style.display = "none";
            }
        }

        function abrirModalPassword(id) {
            document.getElementById('pwdUsuarioId').value = id;
            document.getElementById('changePasswordModal').style.display = 'flex';
        }

        function toggleAlmacenSelector() {
            var rol = document.getElementById('rolSelect').value;
            var group = document.getElementById('almacenSelectorGroup');
            // Los roles de administración ven todos los almacenes automáticamente
            if (rol === 'ADMIN_EMPRESA' || rol === 'ADMIN') {
                group.style.display = 'none';
            } else {
                group.style.display = 'block';
            }
        }
        // Ejecutar al cargar para establecer el estado inicial
        toggleAlmacenSelector();
    </script>
</body>

</html>
