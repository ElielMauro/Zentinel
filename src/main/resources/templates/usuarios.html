<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <title>Zentinel | Usuarios</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet-&gt;
    <style>
        /* Modern minimal layout styles omitted for brevity, reusing same root vars */
        :root {
            --bg-color: #0F172A;
            --surface: #1E293B;
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }
        body { margin: 0; font-family: 'Outfit', sans-serif; background-color: var(--bg-color); color: var(--text-main); display: flex; }
        .sidebar { width: 260px; background: var(--surface); height: 100vh; border-right: 1px solid rgba(255,255,255,0.05); padding: 2rem 1rem; box-sizing: border-box; }
        .main-content { flex: 1; padding: 2rem 3rem; box-sizing: border-box; }
        .logo { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #818CF8 0%, #C084FC 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 3rem; padding: 0 1rem; }
        .nav-item { padding: 1rem; border-radius: 10px; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; transition: all 0.3s ease; margin-bottom: 0.5rem; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: rgba(79, 70, 229, 0.1); color: var(--primary); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        h1 { margin: 0; font-weight: 600; }
        
        .table-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-muted); font-weight: 600; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.85rem; font-weight: 600; }
        .status-active { background: rgba(34, 197, 94, 0.1); color: #86EFAC; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-inactive { background: rgba(239, 68, 68, 0.1); color: #FCA5A5; border: 1px solid rgba(239, 68, 68, 0.2); }
        
        .btn { padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: #F87171; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

        /* Form Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
        .modal-content { background: var(--surface); padding: 2rem; border-radius: 16px; width: 100%; max-width: 500px; border: 1px solid rgba(255,255,255,0.1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal-title { margin: 0; font-size: 1.5rem; }
        .close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border-radius: 8px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); color: white; box-sizing: border-box; font-family: inherit;}
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
    </style>
</head>
<body>

    <div class=" sidebar">
    <div class="logo">Zentinel</div>
    <a href="/" class="nav-item">Dashboard</a>
    <a href="/productos" class="nav-item">Productos</a>
    <a href="/inventario" class="nav-item">Inventario</a>
    <a href="/entradas" class="nav-item">Entradas</a>
    <a href="/salidas" class="nav-item">Salidas</a>
    <a href="/usuarios" class="nav-item active">Usuarios</a>
    <a href="/catalogos" class="nav-item">Catálogos</a>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Gestión de Usuarios</h1>
            </div>
            <button class="btn btn-primary" onclick="document.getElementById('userModal').style.display='flex'">+ Nuevo
                Usuario</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Nombre Completo</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${usuarios}">
                        <td th:text="${user.usuario}">admin</td>
                        <td th:text="${user.nombre + ' ' + user.apellidoPaterno}">Juan Pérez</td>
                        <td th:text="${user.correo}">juan@example.com</td>
                        <td th:text="${user.rol}">ADMIN</td>
                        <td>
                            <span
                                th:class="${user.activo} ? 'status-badge status-active' : 'status-badge status-inactive'"
                                th:text="${user.activo} ? 'Activo' : 'Inactivo'">Activo</span>
                        </td>
                        <td>
                            <form th:if="${user.activo}" th:action="@{/usuarios/eliminar}" method="post"
                                style="display:inline;">
                                <input type="hidden" name="id" th:value="${user.usuario}">
                                <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('¿Desactivar este usuario?')">Desactivar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Nuevo Usuario</h2>
                <button class="close"
                    onclick="document.getElementById('userModal').style.display='none'">&times;</button>
            </div>
            <form th:action="@{/usuarios/guardar}" method="post" th:object="${nuevoUsuario}">
                <div class="form-group">
                    <label>Usuario (ID)</label>
                    <input type="text" th:field="*{usuario}" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" th:field="*{password}" required>
                </div>
                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Apellido Paterno</label>
                        <input type="text" th:field="*{apellidoPaterno}" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Apellido Materno</label>
                        <input type="text" th:field="*{apellidoMaterno}">
                    </div>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" th:field="*{correo}" required>
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <select th:field="*{rol}">
                        <option value="ADMIN">Administrador</option>
                        <option value="USER">Usuario (Almacenista)</option>
                    </select>
                </div>
                <div style="text-align: right; margin-top: 1.5rem;">
                    <button type="button" class="btn"
                        onclick="document.getElementById('userModal').style.display='none'"
                        style="background: transparent; color: var(--text-muted); margin-right: 1rem;">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Usuario</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.onclick = function (event) {
            var modal = document.getElementById('userModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
    </body>

</html>
