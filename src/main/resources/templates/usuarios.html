<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/head :: head('Zentinel | Usuarios')}"></th:block>
    <style>
        .table-container {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1.25rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-badge {
            padding: 0.35rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active { background: rgba(16, 185, 129, 0.1); color: #10B981; border: 1px solid rgba(16, 185, 129, 0.2); }
        .status-inactive { background: rgba(239, 68, 68, 0.1); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .modal-content {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #94a3b8; font-size: 0.9rem; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            font-family: inherit;
            transition: all 0.2s;
        }
        .form-group input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
    </style>
    <script>
        function launchUserModal() {
            console.log("Abriendo modal...");
            document.getElementById('userModal').style.display = 'flex';
        }
        function closeUserModal() {
            document.getElementById('userModal').style.display = 'none';
        }
        function openPwdModal(id) {
            document.getElementById('pwdTargetId').value = id;
            document.getElementById('pwdModal').style.display = 'flex';
        }
        function closePwdModal() {
            document.getElementById('pwdModal').style.display = 'none';
        }
    </script>
</head>

<body>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
            <div th:replace="~{fragments/topbar :: topbar('Gestión de Usuarios', 'Administra los accesos y roles de tu organización')}" style="flex: 1;"></div>
            <button class="btn-primary" onclick="launchUserModal()" style="padding: 0.9rem 1.8rem; border-radius: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);">
                + Nuevo Usuario
            </button>
        </div>

        <div class="table-container">
            <div style="margin-bottom: 2rem;">
                <input type="text" id="userSearch" onkeyup="searchUsers()" placeholder="Busca por cualquier campo..." 
                       style="width: 100%; max-width: 350px; padding: 0.8rem 1.2rem; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: white;">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Nombre Completo</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th style="text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr th:each="user : ${usuarios}">
                        <td style="font-weight: 600;" th:text="${user.usuario}">admin</td>
                        <td th:text="${user.nombre + ' ' + user.apellidoPaterno}">Nombre</td>
                        <td th:text="${user.correo}" style="color: #94a3b8;">correo@zentinel.com</td>
                        <td><span style="font-size: 0.8rem; color: var(--primary); font-weight: 700;" th:text="${user.rol}">ROL</span></td>
                        <td>
                            <span th:class="${user.activo} ? 'status-badge status-active' : 'status-badge status-inactive'" 
                                  th:text="${user.activo} ? 'Activo' : 'Inactivo'">Estado</span>
                        </td>
                        <td style="text-align: right;">
                            <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                <button class="btn" title="Cambiar Clave" th:onclick="'openPwdModal(\'' + ${user.usuario} + '\')'" style="background: rgba(255,255,255,0.05); padding: 0.5rem;">🔑</button>
                                <form th:action="@{/usuarios/eliminar}" method="post" onsubmit="return confirm('¿Confirmas desactivar este acceso?')">
                                    <input type="hidden" name="id" th:value="${user.usuario}">
                                    <button type="submit" style="background: rgba(239, 68, 68, 0.1); color: #EF4444; border: none; padding: 0.5rem 0.8rem; border-radius: 8px; cursor: pointer;">×</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MODAL DE CREACIÓN (DISEÑO PREMIUM) -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top: 0; margin-bottom: 2rem;">Crear Nuevo Usuario</h2>
            <form th:action="@{/usuarios/guardar}" method="post" th:object="${nuevoUsuario}">
                <div class="form-group">
                    <label>Nombre de Usuario (ID)</label>
                    <input type="text" th:field="*{usuario}" required placeholder="ej. jdoe">
                </div>
                <div class="form-group">
                    <label>Contraseña Inicial</label>
                    <input type="password" th:field="*{password}" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Nombre</label>
                        <input type="text" th:field="*{nombre}" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Apellido Paterno</label>
                        <input type="text" th:field="*{apellidoPaterno}" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" th:field="*{correo}" required>
                </div>
                <div class="form-group">
                    <label>Rol del Sistema</label>
                    <select th:field="*{rol}">
                        <option value="ADMIN_EMPRESA">Administrador Principal</option>
                        <option value="ADMIN">Administrador Secundario</option>
                        <option value="MOSTRADOR">Mostrador / Ventas</option>
                        <option value="AUDITOR">Auditoría</option>
                    </select>
                </div>
                <div style="text-align: right; margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem;">
                    <button type="button" onclick="closeUserModal()" style="background: transparent; color: #94a3b8; border: none; cursor: pointer; padding: 0.8rem 1.5rem;">Cancelar</button>
                    <button type="submit" class="btn-primary" style="padding: 0.8rem 2rem; border-radius: 12px; border: none; cursor: pointer;">Guardar Nuevo Usuario</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL PASSWORD -->
    <div id="pwdModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h3>Actualizar Contraseña</h3>
            <form th:action="@{/usuarios/cambiar-password}" method="post">
                <input type="hidden" name="usuarioId" id="pwdTargetId">
                <div class="form-group">
                    <label>Nueva Clave de Acceso</label>
                    <input type="password" name="nuevaPassword" required minlength="4">
                </div>
                <div style="text-align: right; margin-top: 1.5rem;">
                    <button type="button" onclick="closePwdModal()" style="background: transparent; color: #94a3b8; border: none; margin-right: 1rem;">Cerrar</button>
                    <button type="submit" class="btn-primary" style="padding: 0.6rem 1.5rem; border-radius: 8px;">Cambiar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function searchUsers() {
            const input = document.getElementById('userSearch').value.toLowerCase();
            const rows = document.querySelectorAll('#userTableBody tr');
            rows.forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(input) ? '' : 'none';
            });
        }
        // Cerrar modales al hacer clic fuera
        window.onclick = function(event) {
            if (event.target.className.includes('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
