<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Zentinel | Productos')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar('Catálogo de Productos', 'Gestión de productos del almacén')}">
        </div>

        <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div class="search-container" style="margin-bottom: 0; width: 400px;">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por SKU, nombre o categoría..." onkeyup="filterTable()">
            </div>
            <a th:href="@{/productos/nuevo}" class="btn-add" sec:authorize="!hasRole('MOSTRADOR')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Nuevo Producto
            </a>
        </div>

        <div class="form-card full-width">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3>Catálogo de Productos</h3>
                <div th:if="${activeAlmacen != null}" class="badge badge-primary" 
                    th:text="'Almacén Activo: ' + ${activeAlmacen.nombre}"
                    style="font-size: 0.9rem; padding: 0.5rem 1rem;"></div>
            </div>
            
            <table class="premium-table" id="productsTable">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th style="text-align: center;">Stock Local</th>
                        <th style="text-align: center;">Stock Total</th>
                        <th>Precio</th>
                        <th>U.M.</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${listaProductos}">
                        <td>
                            <a th:href="@{/productos/detalle/{sku}(sku=${item.producto.sku})}" 
                               style="color: var(--primary); text-decoration: none; font-weight: 600;" 
                               th:text="${item.producto.sku}"></a>
                        </td>
                        <td th:text="${item.producto.nombre}"></td>
                        <td th:text="${item.producto.tipoProducto != null ? item.producto.tipoProducto.nombre : 'S/C'}"></td>
                        <td style="text-align: center; font-weight: 700; color: var(--primary);" 
                            th:text="${(item.producto.aceptaDecimales ?: false) ? item.stockAlmacen : #numbers.formatInteger(item.stockAlmacen ?: 0, 0)}">0</td>
                        <td style="text-align: center; font-weight: 600;" 
                            th:text="${(item.producto.aceptaDecimales ?: false) ? item.totalGlobal : #numbers.formatInteger(item.totalGlobal ?: 0, 0)}">0</td>
                        <td th:text="${'$' + (item.producto.precioUnitario ?: '0.00')}"></td>
                        <td th:text="${item.producto.unidadMedida}"></td>
                        <td>
                            <span th:class="${'badge ' + (item.producto.activo == true ? 'badge-success' : 'badge-danger')}"
                                th:text="${item.producto.activo == true ? 'Activo' : 'Inactivo'}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listaProductos)}">
                        <td colspan="8" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                            No hay productos registrados.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function filterTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("productsTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let found = false;
                const tds = tr[i].getElementsByTagName("td");
                for (let j = 0; j < tds.length; j++) {
                    if (tds[j]) {
                        const txtValue = tds[j].textContent || tds[j].innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            found = true;
                            break;
                        }
                    }
                }
                tr[i].style.display = found ? "" : "none";
            }
        }
    </script>
</body>

</html>
