<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Zentinel | Productos')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar('Catálogo de Productos', 'Gestión de productos del almacén')}">
        </div>

        <div style="margin-bottom: 2rem; display: flex; justify-content: flex-end;">
            <a th:href="@{/productos/nuevo}" class="btn-add">+ Nuevo Producto</a>
        </div>

        <div class="form-card full-width">
            <h3>Catálogo de Productos</h3>
            <table class="premium-table">
                <thead>
                    <tr>
                        <th>SKU</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>U.M.</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${listaProductos}">
                        <td th:text="${p.sku}"></td>
                        <td th:text="${p.nombre}"></td>
                        <td th:text="${p.tipoProducto != null ? p.tipoProducto.nombre : 'S/C'}"></td>
                        <td th:text="${'$' + p.precioUnitario}"></td>
                        <td th:text="${p.unidadMedida}"></td>
                        <td>
                            <span th:class="${'badge ' + (p.activo ? 'badge-success' : 'badge-danger')}"
                                th:text="${p.activo ? 'Activo' : 'Inactivo'}"></span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listaProductos)}">
                        <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                            No hay productos registrados.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>

</html>
