<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/head :: head('Zentinel | Historial de Facturación')}"></head>

<body>

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar('Historial de Facturación', 'Consolidado de reportes y facturas generadas')}">
        </div>

        <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div class="search-container" style="margin-bottom: 0; width: 400px;">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="Buscar por número de reporte..." onkeyup="filterTable()">
            </div>
            <a th:href="@{/salidas/facturacion/buscar}" class="btn-primary" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                <span>➕</span> Generar Nuevo Reporte
            </a>
        </div>

        <div class="form-card full-width">
            <h3>Reportes / Facturas Consolidadas</h3>
            <table class="premium-table" id="facturasTable">
                <thead>
                    <tr>
                        <th>N° Reporte</th>
                        <th>Fecha Inicial</th>
                        <th>Vales Incluidos</th>
                        <th>Monto Total</th>
                        <th>Estatus</th>
                        <th style="width: 120px;">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="f : ${facturas}">
                        <td>
                            <strong th:text="${f.numReporte}" style="color: var(--primary);"></strong>
                        </td>
                        <td th:text="${#temporals.format(f.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${f.itemsCount + ' vales'}"></td>
                        <td th:text="${'$' + #numbers.formatDecimal(f.total, 1, 'COMMA', 2, 'POINT')}" style="font-weight: 700;"></td>
                        <td>
                            <span th:class="${'badge ' + (f.facturado ? 'badge-primary' : 'badge-warning')}"
                                th:text="${f.facturado ? 'CERRADO (FACTURADO)' : 'PENDIENTE'}"></span>
                        </td>
                        <td style="display: flex; gap: 0.5rem;">
                            <a th:href="@{/salidas/facturacion/{num}(num=${f.numReporte})}" class="btn-icon" title="Ver Detalle / Reimprimir">👁️</a>
                            <a th:href="@{/salidas/facturacion/{num}(num=${f.numReporte})}" class="btn-icon" title="Imprimir" style="filter: hue-rotate(90deg);">🖨️</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(facturas)}">
                        <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 2rem;">
                            No se han generado reportes o facturas consolidadas aún.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function filterTable() {
            const input = document.getElementById("searchInput");
            const filter = input.value.toUpperCase();
            const table = document.getElementById("facturasTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let found = false;
                const tds = tr[i].getElementsByTagName("td");
                for (let j = 0; j < tds.length; j++) {
                    if (tds[j]) {
                        const txtValue = tds[j].textContent || tds[j].innerText;
                        if (txtValue.toUpperCase().indexOf(filter) > -1) {
                            found = true;
                            break;
                        }
                    }
                }
                tr[i].style.display = found ? "" : "none";
            }
        }
    </script>
</body>

</html>
