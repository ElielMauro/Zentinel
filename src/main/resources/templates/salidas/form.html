<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Zentinel | Nueva Salida')}"></head>

<body>
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/topbar :: topbar('Nueva Salida', 'Registro de materiales')}"></div>

        <div class="content-wrapper">
            <div class="header-section">
                <h1>Registro de Salida de Material</h1>
                <p>Complete los datos para generar el vale de salida.</p>
            </div>



            <form th:action="@{/salidas/guardar}" th:object="${salida}" method="post" class="premium-form"
                id="salidaForm">
                <div class="form-grid">
                    <!-- Datos de Control -->
                    <div class="form-card">
                        <h3>Información de Control</h3>
                        <div class="input-group">
                            <label>Almacén de Origen</label>
                            <select th:field="*{almacenOrigen}" required>
                                <option value="">Seleccione Almacén...</option>
                                <option th:each="almacen : ${almacenes}" th:value="${almacen.id}"
                                    th:text="${almacen.nombre}"></option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Área Destino</label>
                            <select th:field="*{area}" required>
                                <option value="">Seleccione Área...</option>
                                <option th:each="area : ${areas}" th:value="${area.id}" th:text="${area.nombre}">
                                </option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Departamento</label>
                            <input type="text" th:field="*{departamento}" placeholder="Ej. Mantenimiento" required>
                        </div>


                    </div>

                    <!-- Datos de Referencia -->
                    <div class="form-card">
                        <h3>Referencias</h3>
                        <div class="input-group">
                            <label>Nombre de quien recibe (Solicitante)</label>
                            <input type="text" th:field="*{nombreSolicitante}"
                                placeholder="Nombre completo de quien se lleva el material" required>
                        </div>
                        <div class="input-group">
                            <label>N° Reporte / Folio</label>
                            <input type="text" th:field="*{numReporte}" placeholder="Opcional">
                        </div>
                        <div class="input-group">
                            <label>N° Presupuesto</label>
                            <input type="text" th:field="*{numPresupuesto}" placeholder="Opcional">
                        </div>
                        <input type="hidden" th:value="${#authentication.name}" name="usuarioAtendio" />
                    </div>
                </div>

                <div class="form-card full-width">
                    <h3>Descripción / Motivo del Movimiento</h3>
                    <textarea th:field="*{descripcion}" rows="3" cols="10"
                        placeholder="Escriba aquí el motivo detallado de la salida (este campo es amplio para su comodidad)..."
                        style="width: 100%; box-sizing: border-box; resize: vertical; min-height: 120px; font-size: 1.1rem; padding: 1.2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15,23,42,0.4); color: white;"></textarea>
                </div>
                <div class="form-card full-width">
                    <h3>Detalle de Materiales</h3>
                    <table class="premium-table" id="tablaProductos">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Existencia</th>
                                <th style="width: 150px;">Precio Unit.</th>
                                <th style="width: 150px;">Cantidad</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="detallesBody">
                            <tr>
                                <td>
                                    <select name="productoId" required class="select-producto"
                                        onchange="updateRowData(this)">
                                        <option value="">Seleccione...</option>
                                        <option th:each="p : ${productos}" th:value="${p.sku}"
                                            th:text="${p.nombre + ' (' + p.sku + ')'}"></option>
                                    </select>
                                </td>
                                <td class="stock-feedback">---</td>
                                <td>
                                    <input type="number" name="precioUnitario" class="price-field fancy-input"
                                        step="0.01" readonly style="font-weight: bold;">
                                </td>
                                <td>
                                    <input type="number" name="cantidad" class="fancy-input" step="0.0001" min="0.0001"
                                        required>
                                </td>
                                <td style="text-align: center;"><button type="button" class="delete-row"
                                        title="Eliminar fila">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M3 6h18"></path>
                                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                                            <line x1="10" y1="11" x2="10" y2="17"></line>
                                            <line x1="14" y1="11" x2="14" y2="17"></line>
                                        </svg>
                                    </button></td>
                            </tr>
                        </tbody>
                    </table>
                    <button type="button" class="btn-secondary mt-2" id="addRow">+ Agregar Producto</button>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Registrar Salida e Imprimir</button>
                    <a th:href="@{/salidas}" class="btn-ghost">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Pre-load inventory data for active warehouse -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const inventoryMap = {};
        const productMetadata = {};
        const inventarioActivo = /*[[${inventarioActivo}]]*/[];
        const listaProductos = /*[[${productos}]]*/[];

        if (Array.isArray(listaProductos)) {
            listaProductos.forEach(p => {
                productMetadata[p.sku] = { aceptaDecimales: p.aceptaDecimales };
            });
        }

        if (Array.isArray(inventarioActivo)) {
            inventarioActivo.forEach(inv => {
                if (inv && inv.sku) {
                    inventoryMap[inv.sku] = inv.cantidad || 0;
                }
            });
        }
        /*]]>*/

        function initTomSelect(element) {
            new TomSelect(element, {
                create: false,
                sortField: {
                    field: "text",
                    direction: "asc"
                },
                placeholder: "Escribe para buscar...",
                allowEmptyOption: true,
                maxOptions: 10,
                searchField: "text"
            });
        }

        // Initialize existing selects
        document.querySelectorAll('.select-producto').forEach(el => initTomSelect(el));

        function updateRowData(selectElement) {
            const sku = selectElement.value;
            const row = selectElement.closest('tr');
            const feedback = row.querySelector('.stock-feedback');
            const priceField = row.querySelector('.price-field');
            const qtyField = row.querySelector('input[name="cantidad"]');

            if (sku && productMetadata[sku]) {
                const meta = productMetadata[sku];

                // Ajustar validación decimal
                if (meta.aceptaDecimales) {
                    qtyField.setAttribute('step', '0.0001');
                } else {
                    qtyField.setAttribute('step', '1');
                    if (qtyField.value) qtyField.value = Math.floor(qtyField.value);
                }

                if (inventoryMap[sku] !== undefined) {
                    const stock = inventoryMap[sku];
                    feedback.textContent = meta.aceptaDecimales ? stock : Math.floor(stock);

                    if (stock <= 0) {
                        feedback.style.color = '#EF4444';
                        feedback.style.fontWeight = 'bold';
                    } else {
                        feedback.style.color = 'inherit';
                        feedback.style.fontWeight = 'normal';
                    }

                    const productData = Array.isArray(inventarioActivo) ? inventarioActivo.find(p => p.sku === sku) : null;
                    if (productData && priceField) {
                        priceField.value = productData.precio || '0.00';
                    }
                } else {
                    feedback.textContent = '0';
                    if (priceField) priceField.value = '';
                }
            } else {
                feedback.textContent = '---';
            }
        }

        document.getElementById('addRow').addEventListener('click', function () {
            const body = document.getElementById('detallesBody');
            const firstRow = body.querySelector('tr');
            if (!firstRow) return;

            const newRow = firstRow.cloneNode(true);

            // Fix TomSelect clone issue gracefully
            const firstSelect = firstRow.querySelector('select.select-producto');
            const newTd = newRow.querySelector('td');
            newTd.innerHTML = ''; // Limpiar clonado sucio

            const clonedSelect = firstSelect.cloneNode(true);
            clonedSelect.classList.remove('tomselected', 'ts-hidden-accessible');
            clonedSelect.removeAttribute('id');
            clonedSelect.removeAttribute('tabindex');
            clonedSelect.style.display = '';
            clonedSelect.value = '';

            newTd.appendChild(clonedSelect);

            // Limpiar valores
            newRow.querySelectorAll('input').forEach(i => i.value = '');
            // El select fue manejado y reinsertado arriba, iniciamos TomSelect
            setTimeout(() => initTomSelect(clonedSelect), 10);

            const feedback = newRow.querySelector('.stock-feedback');
            if (feedback) feedback.textContent = '---';

            body.appendChild(newRow);
        });

        document.getElementById('detallesBody').addEventListener('click', function (e) {
            if (e.target.closest('.delete-row')) {
                const body = document.getElementById('detallesBody');
                if (body.rows.length > 1) {
                    e.target.closest('tr').remove();
                } else {
                    alert('Debe tener al menos un producto en la lista.');
                }
            }
        });

        document.getElementById('salidaForm').addEventListener('submit', function (e) {
            const rowCount = document.getElementById('detallesBody').rows.length;
            const firstSku = document.querySelector('select[name="productoId"]').value;

            if (rowCount === 0 || (rowCount === 1 && !firstSku)) {
                e.preventDefault();
                alert('¡ERROR! Debe agregar al menos un objeto al registro antes de continuar.');
                return;
            }

            // Validar stock insuficiente
            let hasError = false;
            document.querySelectorAll('#detallesBody tr').forEach(row => {
                const sku = row.querySelector('select').value;
                const qty = parseFloat(row.querySelector('input[name="cantidad"]').value);
                const stockAvailable = inventoryMap[sku] || 0;
                if (qty > stockAvailable) {
                    hasError = true;
                }
            });

            if (hasError) {
                if (!confirm('Advertencia: Algunos productos superan el stock disponible. ¿Desea continuar de todos modos?')) {
                    e.preventDefault();
                }
            }
        });
    </script>
</body>

</html>
